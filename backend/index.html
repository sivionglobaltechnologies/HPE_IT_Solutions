<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Contact Manager</h1>
            <a href="/apidocs" class="btn btn-info text-white" target="_blank">View Swagger API Docs</a>
        </div>
        
        <!-- Add Contact Form -->
        <div class="card mb-4">
            <div class="card-header">Add New Contact</div>
            <div class="card-body">
                <form id="contactForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text" class="form-control" id="phone" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Category</label>
                            <input type="text" class="form-control" id="category">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" id="description"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Contact</button>
                </form>
            </div>
        </div>

        <!-- Contact List -->
        <div class="card">
            <div class="card-header">Contacts List</div>
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Category</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="contactsTableBody">
                        <!-- Rows will be populated here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';

        async function loadContacts() {
            const response = await fetch(`${API_URL}/contacts/all`);
            const contacts = await response.json();
            const tbody = document.getElementById('contactsTableBody');
            tbody.innerHTML = '';
            contacts.forEach(c => {
                tbody.innerHTML += `<tr>
                    <td>${c.id}</td><td>${c.name}</td><td>${c.email}</td><td>${c.phone}</td><td>${c.category || '-'}</td>
                    <td><button class="btn btn-danger btn-sm" onclick="deleteContact(${c.id})">Delete</button></td>
                </tr>`;
            });
        }

        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                category: document.getElementById('category').value,
                description: document.getElementById('description').value
            };
            const response = await fetch(`${API_URL}/contact/save`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
            });
            const result = await response.json();
            if (response.ok) { alert('Saved!'); document.getElementById('contactForm').reset(); loadContacts(); }
            else { alert(result.error); }
        });

        async function deleteContact(id) {
            if (!confirm('Delete this contact?')) return;
            await fetch(`${API_URL}/contact/delete/${id}`, { method: 'DELETE' });
            loadContacts();
        }
        loadContacts();
    </script>
</body>
</html>
